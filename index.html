<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCDIGA — Design Reviews</title>
<style>
  :root {
    --bg: #0e1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #f97316;
    --green: #3fb950;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    min-height: 100vh;
  }
  .wrapper { max-width: 720px; margin: 0 auto; padding: 64px 32px; }
  .logo { font-size: 14px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
  h1 { font-size: 32px; font-weight: 700; margin-bottom: 8px; }
  .subtitle { color: var(--text-muted); font-size: 15px; margin-bottom: 48px; }
  .review-list { display: flex; flex-direction: column; gap: 12px; }
  .review-card {
    display: flex; justify-content: space-between; align-items: center;
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 20px 24px; text-decoration: none; color: var(--text);
    transition: border-color .2s, transform .15s;
  }
  .review-card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .review-info h3 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .review-info .meta { font-size: 13px; color: var(--text-muted); display: flex; gap: 16px; }
  .review-info .meta .score { color: var(--green); font-weight: 700; }
  .arrow { color: var(--text-muted); font-size: 20px; transition: color .2s, transform .2s; }
  .review-card:hover .arrow { color: var(--accent); transform: translateX(3px); }
  .empty { color: var(--text-muted); font-size: 14px; text-align: center; padding: 40px; }
  footer { margin-top: 64px; padding-top: 24px; border-top: 1px solid var(--border); font-size: 12px; color: var(--text-muted); text-align: center; }
  @media (max-width: 640px) { .wrapper { padding: 32px 16px; } }
</style>
</head>
<body>
<div class="wrapper">
  <div class="logo">PCDIGA</div>
  <h1>Handoff Spec</h1>
  <p class="subtitle">Entrega de ficheiro prontos para implementação</p>


  <div class="review-list">

      <a class="review-card" href="conta-utilizador-handoff/">
      <div class="review-info">
        <h3>Conta de utilizador</h3>
        <div class="meta">
          <span>17 abril 2026</span>
          <span>Teste para partilhar informação sobre a conta do utilizador</span>
        </div>
      </div>
      <span class="arrow">&#8594;</span>
    </a>

   

  </div>


  <footer>PCDIGA Design Team &middot; Powered by GitHub Pages</footer>
</div>
</body>
</html>
